# Deploy on push to main: build app, sync dist/ to server over SSH.
#
# Required GitHub secret:
#   SSH_MDM_PRIVATE_KEY — full contents of crm-vm-local_key.pem (including BEGIN/END lines)
#
# Edit SSH_DEPLOY_PATH below (use an absolute path — ~ breaks in CI SSH quoting).
#
# SSH vs Docker port:
# - sshd on the VM almost always listens on port 22 (unless you changed /etc/ssh/sshd_config).
# - Port 6666 is usually "docker run -p 6666:80 …" — your *web app*, not SSH.
# - GitHub Actions must reach sshd: open Azure NSG inbound TCP 22 (or your custom SSH port)
#   from GitHub Actions IP ranges (https://api.github.com/meta → "actions"), or use a self-hosted runner.
# - If you really run sshd on 6666, set SSH_PORT to "6666" and allow that port in the NSG.
#
name: Deploy main

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  SSH_HOST: 20.203.101.209
  SSH_USER: azureuser
  SSH_PORT: "22"
  SSH_DEPLOY_PATH: /home/azureuser/mdm-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_MDM_PRIVATE_KEY }}

      # No ssh-keyscan: it often exits 1 from Actions (firewall, timeout, server quirks).
      # accept-new stores the host key on first successful connect (OpenSSH 8+).
      - name: Ensure remote directory exists
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p '${SSH_DEPLOY_PATH}'"

      - name: Deploy static files (rsync)
        env:
          RSYNC_RSH: ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=accept-new
        run: |
          rsync -avz --delete \
            dist/ \
            "${SSH_USER}@${SSH_HOST}:${SSH_DEPLOY_PATH}/"
