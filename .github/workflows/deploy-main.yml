# Deploy on push to main: verify build, sync app to VM, run Docker Compose (host port 5300).
#
# Secret (only this key is used):
#   SSH_MDM_PRIVATE_KEY — full PEM private key for SSH to the VM
#
# Server: Docker Compose v2; user must run Docker (docker group or sudo).
# NSG: TCP 22 for GitHub Actions; TCP 5300 for the web app.
#
name: Deploy main

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  SSH_HOST: 20.203.101.209
  SSH_USER: azureuser
  # SSH (deploy); not the same as APP_PORT below.
  SSH_PORT: "22"
  # Published HTTP port for the Docker app (must match docker-compose host port).
  APP_PORT: "5300"
  SSH_DEPLOY_PATH: /home/azureuser/mdm-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build (fail before deploy)
        run: |
          npm ci
          npm run build

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_MDM_PRIVATE_KEY }}

      - name: Ensure remote directory exists
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p '${SSH_DEPLOY_PATH}'"

      - name: Sync project to server
        env:
          RSYNC_RSH: ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=accept-new
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            --exclude .github \
            --exclude '*.pem' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./ "${SSH_USER}@${SSH_HOST}:${SSH_DEPLOY_PATH}/"

      - name: Build and start containers on server (port 5300)
        run: |
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${SSH_DEPLOY_PATH}' && APP_PORT=5300 docker compose up -d --build --remove-orphans"
